<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop - UrbanKicks</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-logo">
                <a href="index.html">Urban<span class="logo-kicks">Kicks</span></a>
            </div>
            <ul class="nav-menu">
                <li class="nav-item">
                    <a href="index.html" class="nav-link">Home</a>
                </li>
                <li class="nav-item">
                    <a href="shop.html" class="nav-link active">Shop</a>
                </li>
                <li class="nav-item">
                    <a href="about.html" class="nav-link">About</a>
                </li>
                <li class="nav-item">
                    <a href="about.html#contact" class="nav-link">Contact</a>
                </li>
                <li class="nav-item cart-icon">
                    <a href="#" class="nav-link"><i class="fas fa-shopping-cart"></i> <span class="cart-count">3</span></a>
                </li>
            </ul>
            <div class="hamburger">
                <span class="bar"></span>
                <span class="bar"></span>
                <span class="bar"></span>
            </div>
        </div>
    </nav>

    <!-- Shop Hero -->
    <section class="shop-hero">
        <div class="container">
            <h1>Our Collection</h1>
            <p>Discover premium sneakers for every style</p>
        </div>
    </section>

    <!-- Shop Controls -->
    <section class="shop-controls">
        <div class="container">
            <div class="shop-controls-left">
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input type="text" placeholder="Search sneakers...">
                </div>
            </div>
            <div class="shop-controls-right">
                <select class="filter-select">
                    <option>All Categories</option>
                    <option>Sneakers</option>
                    <option>Running</option>
                    <option>Sports</option>
                    <option>Casual</option>
                </select>
                <select class="sort-select">
                    <option>Sort by: Featured</option>
                    <option>Price: Low to High</option>
                    <option>Price: High to Low</option>
                    <option>Newest</option>
                </select>
            </div>
        </div>
    </section>

    <!-- Products Grid -->
    <section class="shop-products">
        <div class="container">
            <div class="products-grid">
                <div class="product-card">
                    <div class="product-image">
                        <img src="https://images.unsplash.com/photo-1549298916-b41d501d3772?ixlib=rb-4.0.3&auto=format&fit=crop&w=1000&q=80" alt="Air Max">
                        <div class="product-overlay">
                            <a href="#" class="quick-view"><i class="fas fa-eye"></i></a>
                            <button class="add-cart"><i class="fas fa-shopping-cart"></i></button>
                        </div>
                    </div>
                    <div class="product-info">
                        <h3>Air Max 90</h3>
                        <div class="rating">
                            <i class="fas fa-star"></i>
                            <i class="fas fa-star"></i>
                            <i class="fas fa-star"></i>
                            <i class="fas fa-star"></i>
                            <i class="fas fa-star"></i>
                            <span>(4.9)</span>
                        </div>
                        <div class="price">Rs.5,999</div>
                        <button class="add-cart-btn">Add to Cart</button>
                    </div>
                </div>
                <!-- Repeat product cards (8 total for demo) -->
                <div class="product-card">
                    <div class="product-image">
                        <img src="https://images.unsplash.com/photo-1605348532760-6753d2c43329?ixlib=rb-4.0.3&auto=format&fit=crop&w=1000&q=80" alt="Yeezy">
                        <div class="product-overlay">
                            <a href="#" class="quick-view"><i class="fas fa-eye"></i></a>
                            <button class="add-cart"><i class="fas fa-shopping-cart"></i></button>
                        </div>
                    </div>
                    <div class="product-info">
                        <h3>Yeezy Boost 350</h3>
                        <div class="rating">
                            <i class="fas fa-star"></i>
                            <i class="fas fa-star"></i>
                            <i class="fas fa-star"></i>
                            <i class="fas fa-star"></i>
                            <i class="fas fa-star"></i>
                            <span>(4.8)</span>
                        </div>
                        <div class="price">Rs.7,100</div>
                        <button class="add-cart-btn">Add to Cart</button>
                    </div>
                </div>

                <div class="product-card">
                    <div class="product-image">
                        <img src="https://images.unsplash.com/photo-1606107557195-0e29a4b5b4aa?fm=jpg&q=60&w=3000&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8NHx8c2hvZXN8ZW58MHx8MHx8fDA%3D" alt="Yeezy">
                        <div class="product-overlay">
                            <a href="#" class="quick-view"><i class="fas fa-eye"></i></a>
                            <button class="add-cart"><i class="fas fa-shopping-cart"></i></button>
                        </div>
                    </div>
                    <div class="product-info">
                        <h3>Dunk Low Panda</h3>
                        <div class="rating">
                            <i class="fas fa-star"></i>
                            <i class="fas fa-star"></i>
                            <i class="fas fa-star"></i>
                            <i class="fas fa-star"></i>
                            <i class="fas fa-star"></i>
                            <span>(4.9)</span>
                        </div>
                        <div class="price">Rs.6,500</div>
                        <button class="add-cart-btn">Add to Cart</button>
                    </div>
                </div>
                <div class="product-card">
                    <div class="product-image">
                        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcT_rsnCEx8JB1zlZ2vl1I2Fb24665NOMmvI_g&s" alt="Yeezy">
                        <div class="product-overlay">
                            <a href="#" class="quick-view"><i class="fas fa-eye"></i></a>
                            <button class="add-cart"><i class="fas fa-shopping-cart"></i></button>
                        </div>
                    </div>
                    <div class="product-info">
                        <h3>Nike Mean Superier</h3>
                        <div class="rating">
                            <i class="fas fa-star"></i>
                            <i class="fas fa-star"></i>
                            <i class="fas fa-star"></i>
                            <i class="fas fa-star"></i>
                            <i class="fas fa-star"></i>
                            <span>(4.9)</span>
                        </div>
                        <div class="price">Rs.4,500</div>
                        <button class="add-cart-btn">Add to Cart</button>
                    </div>
                </div>
                 <div class="product-card">
                    <div class="product-image">
                        <img src="https://www.johnstonmurphy.com/dw/image/v2/AANO_PRD/on/demandware.static/-/Sites-genesco-master/default/dw5e585fd9/large/252896_master.jpg?sw=500&sh=471&strip=false" alt="Yeezy">
                        <div class="product-overlay">
                            <a href="#" class="quick-view"><i class="fas fa-eye"></i></a>
                            <button class="add-cart"><i class="fas fa-shopping-cart"></i></button>
                        </div>
                    </div>
                    <div class="product-info">
                        <h3>Men's Sneakers</h3>
                        <div class="rating">
                            <i class="fas fa-star"></i>
                            <i class="fas fa-star"></i>
                            <i class="fas fa-star"></i>
                            <i class="fas fa-star"></i>
                            <i class="fas fa-star"></i>
                            <span>(4.9)</span>
                        </div>
                        <div class="price">Rs.8,000</div>
                        <button class="add-cart-btn">Add to Cart</button>
                    </div>
                </div>
                <!-- Add 6 more product cards with similar structure -->
            </div>
        </div>
    </section>

    <!-- Footer (same as homepage) -->
    <footer class="footer">
        <!-- Same footer content as homepage -->
    </footer>

    <script src="script.js"></script>
</body>
</html>
